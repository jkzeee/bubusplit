<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>熊熊币记录</title>
  <style>
    :root {
      --bg-dark: #000000;
      --bg-card: #121214;
      --bg-input: #1c1c1e;
      --bg-pill: #2c2c2e;
      --accent-blue: #0a84ff;
      --text-main: #ffffff;
      --text-muted: #8e8e93;
      --success-green: #30d158;
      --danger-red: #ff453a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      background-color: var(--bg-dark);
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    .view-section {
      display: none;
    }
    .view-section.active {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    /* PROFILE SELECT VIEW */
    #auth-view {
      justify-content: center;
      align-items: center;
      padding: 24px;
      background-color: var(--bg-card);
    }

    .pin-title {
      font-size: 1.7rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .pin-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 40px;
    }

    .user-select-container {
      display: flex;
      gap: 24px;
    }

    .user-avatar-btn {
      background: var(--bg-input);
      border: 2px solid transparent;
      border-radius: 16px;
      width: 110px;
      height: 110px;
      font-size: 1rem;
      color: var(--text-main);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .user-avatar-btn:active {
      background-color: var(--bg-pill);
      transform: scale(0.95);
    }

    /* MAIN INTERFACE HEADER */
    .tricount-header {
      padding: 24px 16px 16px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .switch-profile-badge {
      position: absolute;
      top: 24px;
      right: 16px;
      background-color: var(--bg-input);
      color: var(--accent-blue);
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .switch-profile-badge:active {
      background-color: var(--bg-pill);
    }

    .avatar-main {
      font-size: 3rem;
      margin-bottom: 6px;
    }

    .app-main-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .tricount-tabs {
      display: flex;
      background-color: var(--bg-input);
      padding: 4px;
      border-radius: 99px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 24px;
    }

    .tri-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tri-tab.active {
      background-color: var(--bg-pill);
      color: var(--text-main);
    }

    .metrics-summary-bar {
      display: flex;
      justify-content: space-around;
      width: 100%;
      margin-bottom: 12px;
      padding: 0 8px;
    }

    .metric-block {
      text-align: center;
    }

    .metric-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .metric-val {
      font-size: 1.15rem;
      font-weight: 700;
    }

    /* TRANSACTION FEEDS */
    .content-scroll-zone {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .date-group-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .tx-card-row {
      background-color: var(--bg-card);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .tx-card-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .tx-icon-wrapper {
      font-size: 1.5rem;
      background-color: var(--bg-input);
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .tx-meta h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .tx-meta p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .tx-card-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tx-card-value {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .card-trash-btn {
      background: none;
      border: none;
      color: var(--danger-red);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px;
    }

    /* BALANCES BOX */
    .balance-card-box {
      background-color: var(--bg-card);
      border-radius: 16px;
      padding: 20px;
      margin-top: 10px;
    }

    .settlement-alert {
      background-color: rgba(10, 132, 255, 0.1);
      border-left: 4px solid var(--accent-blue);
      padding: 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      margin-top: 20px;
      line-height: 1.4;
    }

    /* FAB POSITIONING */
    .floating-action-anchor {
      position: fixed;
      bottom: 30px;
      right: calc(50% - 200px);
      z-index: 99;
    }
    @media (max-width: 440px) {
      .floating-action-anchor { right: 24px; }
    }

    .fab-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background-color: var(--accent-blue);
      border: none;
      box-shadow: 0 4px 12px rgba(10, 132, 255, 0.4);
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* BOTTOM DRAWER MODAL */
    .modal-bottom-drawer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.6);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: flex-end;
    }

    .modal-bottom-drawer.open {
      display: flex;
    }

    .drawer-surface {
      width: 100%;
      max-width: 440px;
      background-color: var(--bg-card);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 24px;
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .drawer-close-btn {
      background: none;
      border: none;
      color: var(--accent-blue);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
