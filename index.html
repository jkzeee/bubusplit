<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bubu & Yier Ledger</title>
  <style>
    :root {
      --bg-primary: #121214;
      --bg-card: #1a1a1e;
      --bg-input: #26262b;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --border-radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      background-color: var(--bg-card);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      min-height: 600px;
      display: flex;
      flex-direction: column;
    }

    .view-section {
      display: none;
    }
    .view-section.active {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    #auth-view {
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .pin-title {
      font-size: 1.5rem;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .pin-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .user-select-container {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .user-avatar-btn {
      background: var(--bg-input);
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 16px;
      font-size: 1rem;
      color: var(--text-main);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .user-avatar-btn.selected {
      border-color: var(--accent-color);
      background-color: #2e2e38;
      transform: scale(1.05);
    }

    .pin-dots-container {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
    }

    .pin-dot {
      width: 16px;
      height: 16px;
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      transition: all 0.15s ease;
    }

    .pin-dot.filled {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
    }

    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 280px;
    }

    .pin-btn {
      background-color: var(--bg-input);
      border: none;
      color: var(--text-main);
      font-size: 1.6rem;
      font-weight: 500;
      height: 70px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.1s ease;
    }

    .pin-btn:active {
      background-color: #323239;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .user-badge {
      background-color: var(--bg-input);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--accent-color);
      font-weight: 600;
    }

    .nav-tabs {
      display: flex;
      background-color: var(--bg-input);
      padding: 4px;
      border-radius: var(--border-radius);
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      border-radius: calc(var(--border-radius) - 4px);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background-color: var(--accent-color);
      color: #ffffff;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      background-color: var(--bg-input);
      border: 1px solid transparent;
      color: var(--text-main);
      padding: 12px;
      font-size: 1rem;
      border-radius: var(--border-radius);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      border-color: var(--accent-color);
    }

    .submit-btn {
      width: 100%;
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--border-radius);
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s;
    }

    .history-header {
      margin-top: 28px;
      margin-bottom: 12px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .transaction-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 250px;
      overflow-y: auto;
    }

    .tx-item {
      background-color: var(--bg-input);
      padding: 12px;
      border-radius: var(--border-radius);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tx-info h4 {
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .tx-info p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .tx-amount {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tx-amount.income { color: var(--success-color); }
    .tx-amount.expense { color: var(--text-main); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--danger-color);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background-color: var(--bg-input);
      color: var(--text-main);
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      font-size: 0.9rem;
      font-weight: 500;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- AUTH VIEW -->
    <div id="auth-view" class="view-section active">
      <h2 class="pin-title">Welcome Back</h2>
      <p class="pin-subtitle">Select profile and enter 6-digit PIN</p>
      
      <div class="user-select-container">
        <button class="user-avatar-btn" id="avatar-CYO" onclick="selectUser('CYO', this)">
          <span style="font-size: 2rem;">🐻</span>
          <span>Bubu</span>
        </button>
        <button class="user-avatar-btn" id="avatar-LKS" onclick="selectUser('LKS', this)">
          <span style="font-size: 2rem;">🐼</span>
          <span>Yier</span>
        </button>
      </div>

      <div class="pin-dots-container">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
        <div class="pin-dot" id="dot-4"></div>
        <div class="pin-dot" id="dot-5"></div>
      </div>

      <div class="pin-pad">
        <button class="pin-btn" onclick="pressPin('1')">1</button>
        <button class="pin-btn" onclick="pressPin('2')">2</button>
        <button class="pin-btn" onclick="pressPin('3')">3</button>
        <button class="pin-btn" onclick="pressPin('4')">4</button>
        <button class="pin-btn" onclick="pressPin('5')">5</button>
        <button class="pin-btn" onclick="pressPin('6')">6</button>
        <button class="pin-btn" onclick="pressPin('7')">7</button>
        <button class="pin-btn" onclick="pressPin('8')">8</button>
        <button class="pin-btn" onclick="pressPin('9')">9</button>
        <button class="pin-btn" style="color:var(--danger-color); font-size:1rem;" onclick="clearPin()">Clear</button>
        <button class="pin-btn" onclick="pressPin('0')">0</button>
        <button class="pin-btn" style="font-size:1.2rem;" onclick="pressPin('⌫')">⌫</button>
      </div>
    </div>

    <!-- MAIN VIEW -->
    <div id="main-view" class="view-section">
      <div class="dashboard-header">
        <h2>Ledger Center</h2>
        <span class="user-badge" id="user-display">User</span>
      </div>

      <div class="nav-tabs">
        <button class="tab-btn active" id="tab-shared" onclick="switchTab('Shared_Ledger')">Joint Ledger</button>
        <button class="tab-btn" id="tab-private" onclick="switchTab('Private_Ledger')">Private Vault</button>
      </div>

      <form id="ledger-form" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
          <label for="tx-date">Date</label>
          <input type="date" id="tx-date" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="tx-desc">Description</label>
          <input type="text" id="tx-desc" class="form-control" placeholder="Lunch, grocery, tolls..." required>
        </div>

        <div class="form-group">
          <label for="tx-amount">Amount (RM)</label>
          <input type="number" id="tx-amount" class="form-control" step="0.01" placeholder="0.00" required>
        </div>

        <div class="form-group">
          <label for="tx-category">Category</label>
          <select id="tx-category" class="form-control">
            <option value="Food & Groceries">Food & Groceries</option>
            <option value="House Rent">House Rent</option>
            <option value="Utilities & Subscriptions">Utilities & Subscriptions</option>
            <option value="Outing / Dates">Outing / Dates</option>
            <option value="Shared Projects / Goals">Shared Projects / Goals</option>
            <option value="Others (Shared)">Others (Shared)</option>
          </select>
        </div>

        <div class="form-group" id="flow-group" style="display: none;">
          <label for="tx-flow">Type</label>
          <select id="tx-flow" class="form-control">
            <option value="Expense">Personal Outflow</option>
            <option value="Income">Personal Inflow</option>
          </select>
        </div>

        <button type="submit" class="submit-btn" id="form-submit-btn">Save Entry</button>
      </form>

      <h3 class="history-header">Recent Activity</h3>
      <div class="transaction-list" id="transaction-feed"></div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
    // Paste your exact Web App URL inside the quotes below!
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyRwnAE-rROX1rxbZZngG_G3HaR2cUl-84eYQhcoOpSo9EqSrwwXpaDFYlo40cZ4SF7/exec";

    // Mapped PIN definitions
    const USER_PINS = {
      "CYO": "111111", // Bubu
      "LKS": "222222"  // Yier
    };

    let selectedUserCode = "";
    let currentPinInput = "";
    let currentTab = "Shared_Ledger";
    let dataCache = { shared: [], private: [] };

    document.getElementById('tx-date').valueAsDate = new Date();

    // AUTH / SECURITY INTERFACE ACTIONS
    function selectUser(userCode, element) {
      selectedUserCode = userCode;
      document.querySelectorAll('.user-avatar-btn').forEach(btn => btn.classList.remove('selected'));
      if(element) {
        element.classList.add('selected');
      } else {
        const tgt = document.getElementById(`avatar-${userCode}`);
        if(tgt) tgt.classList.add('selected');
      }
      clearPin();
    }

    function pressPin(num) {
      if (!selectedUserCode) {
        showToast("Select a profile first!", "danger");
        return;
      }
      
      if (num === '⌫') {
        currentPinInput = currentPinInput.slice(0, -1);
      } else {
        if (currentPinInput.length < 6) currentPinInput += num;
      }
      
      updatePinDots();

      if (currentPinInput.length === 6) {
        setTimeout(verifySecurityPin, 150);
      }
    }

    function clearPin() {
      currentPinInput = "";
      updatePinDots();
    }

    function updatePinDots() {
      for (let i = 0; i < 6; i++) {
        const dot = document.getElementById(`dot-${i}`);
        if (dot) {
          if (i < currentPinInput.length) dot.classList.add('filled');
          else dot.classList.remove('filled');
        }
      }
    }

    function verifySecurityPin() {
      if (USER_PINS[selectedUserCode] === currentPinInput) {
        const nameDisplay = selectedUserCode === "CYO" ? "Bubu 🐻" : "Yier 🐼";
        document.getElementById('user-display').textContent = nameDisplay;
        showToast(`Unlocked as ${nameDisplay}`, "success");
        
        document.getElementById('auth-view').classList.remove('active');
        document.getElementById('main-view').classList.add('active');
        
        syncFetch();
      } else {
        showToast("Incorrect Security PIN!", "danger");
        clearPin();
      }
    }

    // Dynamic Category List Switcher
    function switchTab(targetTable) {
      currentTab = targetTable;
      const tabShared = document.getElementById('tab-shared');
      const tabPrivate = document.getElementById('tab-private');
      const flowGroup = document.getElementById('flow-group');
      const catSelect = document.getElementById('tx-category');
      
      catSelect.innerHTML = "";
      
      if (targetTable === 'Shared_Ledger') {
        tabShared.classList.add('active');
        tabPrivate.classList.remove('active');
        flowGroup.style.display = 'none';
        
        const options = ["Food & Groceries", "House Rent", "Utilities & Subscriptions", "Outing / Dates", "Shared Projects / Goals", "Others (Shared)"];
        options.forEach(opt => catSelect.add(new Option(opt, opt)));
      } else {
        tabShared.classList.remove('active');
        tabPrivate.classList.add('active');
        flowGroup.style.display = 'block';
        
        const options = ["Government Salary", "Locum Income", "Car Loan", "Petrol & Tolls", "Car Maintenance", "Insurance", "Savings & Investments", "Utilities & Subscriptions", "Personal Food", "Others (Personal)"];
        options.forEach(opt => catSelect.add(new Option(opt, opt)));
      }
      
      renderFeed();
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('form-submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = "Syncing...";

      let payload = {
        action: "CREATE",
        targetTable: currentTab,
        date: document.getElementById('tx-date').value,
        description: document.getElementById('tx-desc').value,
        amount: document.getElementById('tx-amount').value,
        category: document.getElementById('tx-category').value
      };

      if (currentTab === "Shared_Ledger") {
        payload.paidBy = selectedUserCode;
      } else {
        payload.flowType = document.getElementById('tx-flow').value;
        payload.operator = selectedUserCode;
      }

      await sendToSpreadsheet(payload);
      showToast("Transaction synced successfully!", "success");
      
      document.getElementById('tx-desc').value = "";
      document.getElementById('tx-amount').value = "";
      submitBtn.disabled = false;
      submitBtn.textContent = "Save Entry";
      
      syncFetch();
    }

    // Upgraded Connection Module using JSONP Pipeline to bypass CORS restrictions
    async function sendToSpreadsheet(payload) {
      return new Promise((resolve) => {
        const callbackName = "jsonp_" + Math.round(Math.random() * 1000000);
        
        window[callbackName] = function(data) {
          delete window[callbackName];
          try { document.body.removeChild(script); } catch(e){}
          resolve(data);
        };

        const encodedPayload = encodeURIComponent(JSON.stringify(payload));
        const script = document.createElement("script");
        script.src = `${WEB_APP_URL}?callback=${callbackName}&prefix=${callbackName}&data=${encodedPayload}`;
        
        script.onerror = function() {
          if(window[callbackName]) delete window[callbackName];
          try { document.body.removeChild(script); } catch(e){}
          resolve(null);
        };
        
        document.body.appendChild(script);
      });
    }

    async function syncFetch() {
      try {
        const response = await sendToSpreadsheet({ action: "READ", operator: selectedUserCode });
        if (response && response.status === "success") {
          dataCache.shared = response.shared || [];
          dataCache.private = response.private || [];
          renderFeed();
        } else {
          showToast("History data sync unavailable", "danger");
        }
      } catch (err) {
        showToast("Network fetch failed", "danger");
      }
    }

    function renderFeed() {
      const feed = document.getElementById('transaction-feed');
      feed.innerHTML = "";
      const rows = currentTab === "Shared_Ledger" ? dataCache.shared : dataCache.private;
      
      if (!rows || rows.length === 0) {
        feed.innerHTML = `<p style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:16px;">No entries tracked yet.</p>`;
        return;
      }

      [...rows].reverse().forEach(row => {
        const item = document.createElement('div');
        item.className = 'tx-item';
        let subText = "", styleClass = "expense", sign = "RM ";
        
        const dateStr = new Date(row[1]).toLocaleDateString('en-SG', {day: 'numeric', month: 'short'});
        
        if (currentTab === "Shared_Ledger") {
          subText = `${dateStr} · ${row[4]} pays (${row[6]})`;
        } else {
          subText = `${dateStr} · ${row[4]}`;
          if (row[5] === "Income") { styleClass = "income"; sign = "+ RM "; }
        }

        item.innerHTML = `
          <div class="tx-info">
            <h4>${row[2]}</h4>
            <p>${subText}</p>
          </div>
          <div class="tx-amount ${styleClass}">
            <span>${sign}${parseFloat(row[3]).toFixed(2)}</span>
            <button class="delete-btn" onclick="deleteRecord('${row[0]}')">🗑️</button>
          </div>
        `;
        feed.appendChild(item);
      });
    }

    async function deleteRecord(rowId) {
      if (!confirm("Delete this entry permanently from Google Sheets?")) return;
      await sendToSpreadsheet({ action: "DELETE", targetTable: currentTab, rowId: rowId });
      showToast("Entry deleted.", "success");
      syncFetch();
    }

    function showToast(text, type) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.style.borderLeft = type === "success" ? "4px solid #10b981" : "4px solid #ef4444";
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
