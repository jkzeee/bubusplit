<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>熊熊币记录</title>
  <style>
    :root {
      --bg-dark: #000000;
      --bg-card: #121214;
      --bg-input: #1c1c1e;
      --bg-pill: #2c2c2e;
      --accent-blue: #0a84ff;
      --text-main: #ffffff;
      --text-muted: #8e8e93;
      --success-green: #30d158;
      --danger-red: #ff453a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      background-color: var(--bg-dark);
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-bottom: 100px; /* Space for FAB */
    }

    .view-section {
      display: none;
    }
    .view-section.active {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    /* ==========================================
       AUTH VIEW (LOCK SCREEN) LOOK & FEEL
       ========================================== */
    #auth-view {
      justify-content: center;
      align-items: center;
      padding: 24px;
      background-color: var(--bg-card);
    }

    .pin-title {
      font-size: 1.7rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .pin-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 40px;
    }

    .user-select-container {
      display: flex;
      gap: 24px;
      margin-bottom: 40px;
    }

    .user-avatar-btn {
      background: var(--bg-input);
      border: 2px solid transparent;
      border-radius: 16px;
      width: 90px;
      height: 90px;
      font-size: 0.95rem;
      color: var(--text-main);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .user-avatar-btn.selected {
      border-color: var(--accent-blue);
      background-color: var(--bg-pill);
      transform: scale(1.05);
    }

    .pin-dots-container {
      display: flex;
      gap: 16px;
      margin-bottom: 50px;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      transition: all 0.15s ease;
    }

    .pin-dot.filled {
      background-color: var(--text-main);
      border-color: var(--text-main);
      box-shadow: 0 0 8px var(--text-main);
    }

    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 280px;
      justify-items: center;
    }

    .pin-btn {
      background-color: var(--bg-input);
      border: none;
      color: var(--text-main);
      font-size: 1.75rem;
      font-weight: 400;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      aspect-ratio: 1 / 1;
    }

    .pin-btn:active {
      background-color: var(--bg-pill);
    }

    /* ==========================================
       TRICOUNT OVERHAUL DESIGN SPECIFICATIONS
       ========================================== */
    .tricount-header {
      padding: 24px 16px 16px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar-main {
      font-size: 3rem;
      margin-bottom: 6px;
    }

    .app-main-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Native Pill Sub-Navigation Tab Wrappers */
    .tricount-tabs {
      display: flex;
      background-color: var(--bg-input);
      padding: 4px;
      border-radius: 99px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 24px;
    }

    .tri-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tri-tab.active {
      background-color: var(--bg-pill);
      color: var(--text-main);
    }

    /* Metric Performance Summary Layer */
    .metrics-summary-bar {
      display: flex;
      justify-content: space-around;
      width: 100%;
      margin-bottom: 12px;
      padding: 0 8px;
    }

    .metric-block {
      text-align: center;
    }

    .metric-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .metric-val {
      font-size: 1.15rem;
      font-weight: 700;
    }

    /* Scrollable Activity Card Feeds */
    .content-scroll-zone {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .date-group-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .tx-card-row {
      background-color: var(--bg-card);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .tx-card-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .tx-icon-wrapper {
      font-size: 1.5rem;
      background-color: var(--bg-input);
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .tx-meta h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .tx-meta p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .tx-card-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tx-card-value {
      font-size: 1.05rem;
      font-weight: 700;
    }
    .tx-card-value.income { color: var(--success-green); }

    .card-trash-btn {
      background: none;
      border: none;
      color: var(--danger-red);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px;
    }

    /* Balance Calculator Layout View */
    .balance-card-box {
      background-color: var(--bg-card);
      border-radius: 16px;
      padding: 20px;
      margin-top: 10px;
    }

    .settlement-alert {
      background-color: rgba(10, 132, 255, 0.1);
      border-left: 4px solid var(--accent-blue);
      padding: 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      margin-top: 20px;
      line-height: 1.4;
    }

    /* ==========================================
       FLOATING ACTION BUTTON & SLIDING SHEET
       ========================================== */
    .floating-action-anchor {
      position: fixed;
      bottom: 30px;
      right: calc(50% - 200px);
      z-index: 99;
    }
    @media (max-width: 440px) {
      .floating-action-anchor { right: 24px; }
    }

    .fab-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background-color: var(--accent-blue);
      border: none;
      box-shadow: 0 4px 12px rgba(10, 132, 255, 0.4);
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Modal Context Drawer Block */
    .modal-bottom-drawer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.6);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: flex-end;
    }

    .modal-bottom-drawer.open {
      display: flex;
    }

    .drawer-surface {
      width: 100%;
      max-width: 440px;
      background-color: var(--bg-card);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 24px;
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .drawer-close-btn {
      background: none;
      border: none;
      color: var(--accent-blue);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .form-control {
      width: 100%;
      background-color: var(--bg-input);
      border: 1px solid transparent;
      color: var(--text-main);
      padding: 14px;
      font-size: 1rem;
      border-radius: 12px;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--accent-blue);
    }

    .sheet-submit-btn {
      width: 100%;
      background-color: var(--accent-blue);
      color: white;
      border: none;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 12px;
    }

    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(150px);
      background-color: var(--bg-pill);
      color: var(--text-main);
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      font-size: 0.9rem;
      font-weight: 600;
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div id="auth-view" class="view-section active">
      <h2 class="pin-title">Welcome Back</h2>
      <p class="pin-subtitle">Select profile and enter 6-digit PIN</p>
      
      <div class="user-select-container">
        <button class="user-avatar-btn" id="avatar-CYO" onclick="selectUser('CYO', this)">
          <span style="font-size: 2.2rem;">🐻</span>
          <span>Bubu</span>
        </button>
        <button class="user-avatar-btn" id="avatar-LKS" onclick="selectUser('LKS', this)">
          <span style="font-size: 2.2rem;">🐼</span>
          <span>Yier</span>
        </button>
      </div>

      <div class="pin-dots-container">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
        <div class="pin-dot" id="dot-4"></div>
        <div class="pin-dot" id="dot-5"></div>
      </div>

      <div class="pin-pad">
        <button class="pin-btn" onclick="pressPin('1')">1</button>
        <button class="pin-btn" onclick="pressPin('2')">2</button>
        <button class="pin-btn" onclick="pressPin('3')">3</button>
        <button class="pin-btn" onclick="pressPin('4')">4</button>
        <button class="pin-btn" onclick="pressPin('5')">5</button>
        <button class="pin-btn" onclick="pressPin('6')">6</button>
        <button class="pin-btn" onclick="pressPin('7')">7</button>
        <button class="pin-btn" onclick="pressPin('8')">8</button>
        <button class="pin-btn" onclick="pressPin('9')">9</button>
        <button class="pin-btn" style="color:var(--danger-red); font-size:0.95rem; font-weight:600;" onclick="clearPin()">Clear</button>
        <button class="pin-btn" onclick="pressPin('0')">0</button>
        <button class="pin-btn" style="font-size:1.3rem;" onclick="pressPin('⌫')">⌫</button>
      </div>
    </div>

    <div id="main-view" class="view-section">
      <div class="tricount-header">
        <div class="avatar-main" id="header-avatar">🐻</div>
        <h2 class="app-main-title">熊熊币记录</h2>
        
        <div class="tricount-tabs">
          <button class="tri-tab active" id="btn-sub-exp" onclick="setSubView('expenses')">Expenses</button>
          <button class="tri-tab" id="btn-sub-bal" onclick="setSubView('balances')">Balances</button>
        </div>

        <div class="metrics-summary-bar">
          <div class="metric-block">
            <div class="metric-label">My Expenses</div>
            <div class="metric-val" id="val-my-expenses" style="color: var(--accent-blue);">RM 0.00</div>
          </div>
          <div class="metric-block">
            <div class="metric-label">Total Expenses</div>
            <div class="metric-val" id="val-total-expenses">RM 0.00</div>
          </div>
        </div>
      </div>

      <div class="content-scroll-zone" id="sub-view-expenses">
        </div>

      <div class="content-scroll-zone" id="sub-view-balances" style="display: none;">
        <div class="balance-card-box">
          <div style="display:flex; justify-content:space-between; margin-bottom:14px; font-size:0.95rem;">
            <span style="color:var(--text-muted);">Bubu 🐻 Paid Shared Total</span>
            <span id="bal-bubu-paid" style="font-weight:700;">RM 0.00</span>
          </div>
          <div style="display:flex; justify-content:space-between; margin-bottom:14px; font-size:0.95rem;">
            <span style="color:var(--text-muted);">Yier 🐼 Paid Shared Total</span>
            <span id="bal-yier-paid" style="font-weight:700;">RM 0.00</span>
          </div>
          <hr style="border:0; border-top:1px solid var(--bg-pill); margin:12px 0;">
          <div class="settlement-alert" id="settlement-sentence">Calculating share equations...</div>
        </div>
      </div>

      <div class="floating-action-anchor">
        <button class="fab-btn" onclick="openDrawer()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
    </div>

  </div>

  <div class="modal-bottom-drawer" id="entry-drawer" onclick="closeDrawerViaBackdrop(event)">
    <div class="drawer-surface">
      <div class="drawer-header">
        <h3 style="font-size: 1.2rem; font-weight:700;">Add New Transaction</h3>
        <button class="drawer-close-btn" onclick="closeDrawer()">Cancel</button>
      </div>

      <div class="tricount-tabs" style="max-width:100%; margin-bottom:20px;">
        <button class="tri-tab active" id="form-tab-shared" type="button" onclick="setFormTable('Shared_Ledger')">Joint Ledger</button>
        <button class="tri-tab" id="form-tab-private" type="button" onclick="setFormTable('Private_Ledger')">Private Vault</button>
      </div>

      <form id="ledger-form" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="tx-date" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Description</label>
          <input type="text" id="tx-desc" class="form-control" placeholder="What did you buy?" required>
        </div>

        <div class="form-group">
          <label>Amount (RM)</label>
          <input type="number" id="tx-amount" class="form-control" step="0.01" placeholder="0.00" required>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="tx-category" class="form-control"></select>
        </div>

        <div class="form-group" id="flow-group" style="display: none;">
          <label>Type</label>
          <select id="tx-flow" class="form-control">
            <option value="Expense">Personal Outflow</option>
            <option value="Income">Personal Inflow</option>
          </select>
        </div>

        <button type="submit" class="sheet-submit-btn" id="form-submit-btn">Save Entry</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyRwnAE-rROX1rxbZZngG_G3HaR2cUl-84eYQhcoOpSo9EqSrwwXpaDFYlo40cZ4SF7/exec";

    const USER_PINS = {
      "CYO": "111111", // Bubu
      "LKS": "222222"  // Yier
    };

    let selectedUserCode = "";
    let currentPinInput = "";
    let currentTab = "Shared_Ledger"; 
    let currentSubView = "expenses"; 
    let dataCache = { shared: [], private: [] };

    // Fallback dictionary until the Sheet Keyword Database is wired up next
    const EMOJI_MAP = {
      "Food & Groceries": "🍲", "Personal Food": "🍲",
      "House Rent": "🏠", "Utilities & Subscriptions": "🔌",
      "Outing / Dates": "🎬", "Shared Projects / Goals": "📈",
      "Government Salary": "💼", "Locum Income": "🩺",
      "Car Loan": "🚗", "Petrol & Tolls": "⛽",
      "Car Maintenance": "🔧", "Insurance": "🛡️",
      "Savings & Investments": "💰", "Others (Shared)": "📦", "Others (Personal)": "📦"
    };

    document.getElementById('tx-date').valueAsDate = new Date();

    function selectUser(userCode, element) {
      selectedUserCode = userCode;
      document.querySelectorAll('.user-avatar-btn').forEach(btn => btn.classList.remove('selected'));
      if(element) element.classList.add('selected');
      clearPin();
    }

    function pressPin(num) {
      if (!selectedUserCode) { return showToast("Select profile!", "danger"); }
      if (num === '⌫') { currentPinInput = currentPinInput.slice(0, -1); }
      else { if (currentPinInput.length < 6) currentPinInput += num; }
      updatePinDots();
      if (currentPinInput.length === 6) setTimeout(verifySecurityPin, 150);
    }

    function clearPin() { currentPinInput = ""; updatePinDots(); }

    function updatePinDots() {
      for (let i = 0; i < 6; i++) {
        const dot = document.getElementById(`dot-${i}`);
        if (dot) {
          if (i < currentPinInput.length) dot.classList.add('filled');
          else dot.classList.remove('filled');
        }
      }
    }

    function verifySecurityPin() {
      if (USER_PINS[selectedUserCode] === currentPinInput) {
        document.getElementById('header-avatar').textContent = selectedUserCode === "CYO" ? "🐻" : "🐼";
        document.getElementById('auth-view').classList.remove('active');
        document.getElementById('main-view').classList.add('active');
        setFormTable('Shared_Ledger');
        syncFetch();
      } else {
        showToast("Incorrect Security PIN!", "danger");
        clearPin();
      }
    }

    function setSubView(target) {
      currentSubView = target;
      document.getElementById('btn-sub-exp').classList.toggle('active', target === 'expenses');
      document.getElementById('btn-sub-bal').classList.toggle('active', target === 'balances');
      document.getElementById('sub-view-expenses').style.display = target === 'expenses' ? 'flex' : 'none';
      document.getElementById('sub-view-balances').style.display = target === 'balances' ? 'block' : 'none';
      renderFeed();
    }

    function setFormTable(targetTable) {
      currentTab = targetTable;
      document.getElementById('form-tab-shared').classList.toggle('active', targetTable === 'Shared_Ledger');
      document.getElementById('form-tab-private').classList.toggle('active', targetTable === 'Private_Ledger');
      document.getElementById('flow-group').style.display = targetTable === 'Private_Ledger' ? 'block' : 'none';
      
      const catSelect = document.getElementById('tx-category');
      catSelect.innerHTML = "";
      
      const options = targetTable === 'Shared_Ledger' 
        ? ["Food & Groceries", "House Rent", "Utilities & Subscriptions", "Outing / Dates", "Shared Projects / Goals", "Others (Shared)"]
        : ["Government Salary", "Locum Income", "Car Loan", "Petrol & Tolls", "Car Maintenance", "Insurance", "Savings & Investments", "Utilities & Subscriptions", "Personal Food", "Others (Personal)"];
        
      options.forEach(opt => catSelect.add(new Option(opt, opt)));
    }

    function openDrawer() { document.getElementById('entry-drawer').classList.add('open'); }
    function closeDrawer() { document.getElementById('entry-drawer').classList.remove('open'); }
    function closeDrawerViaBackdrop(e) { if(e.target.id === 'entry-drawer') closeDrawer(); }

    // OPTIMISTIC UI ENGINE (INSTANT RENDERING)
    async function handleFormSubmit(e) {
      e.preventDefault();
      
      const inputDate = document.getElementById('tx-date').value;
      const inputDesc = document.getElementById('tx-desc').value;
      const inputAmount = parseFloat(document.getElementById('tx-amount').value) || 0;
      const inputCategory = document.getElementById('tx-category').value;
      
      // 1. Create temporary optimistic object layout
      const tempId = "temp_" + Date.now();
      const tempRow = [
        tempId, 
        inputDate, 
        inputDesc, 
        inputAmount, 
        selectedUserCode, 
        "Equally", 
        inputCategory
      ];

      // 2. Instantly push to local cache data state & recalculate UI elements
      if (currentTab === "Shared_Ledger") {
        dataCache.shared.push(tempRow);
      } else {
        const flowType = document.getElementById('tx-flow').value;
        dataCache.private.push([tempId, inputDate, inputDesc, inputAmount, selectedUserCode, flowType, inputCategory]);
      }

      // 3. Render immediately to UI display layout frames
      calculateRunningMetrics();
      renderFeed();
      closeDrawer();
      showToast("Entry Added!", "success");

      // Reset form variables safely
      document.getElementById('tx-desc').value = "";
      document.getElementById('tx-amount').value = "";

      // 4. Fire network sync completely in background thread execution
      let payload = {
        action: "CREATE",
        targetTable: currentTab,
        date: inputDate,
        description: inputDesc,
        amount: inputAmount,
        category: inputCategory
      };

      if (currentTab === "Shared_Ledger") { payload.paidBy = selectedUserCode; } 
      else { payload.flowType = document.getElementById('tx-flow').value; payload.operator = selectedUserCode; }

      const response = await sendToSpreadsheet(payload);
      
      // Quietly swap temp data out for official database payload sync frames
      if (!response || response.status !== "success") {
        showToast("Sync Background Fail!", "danger");
      }
      syncFetch(); 
    }

    async function sendToSpreadsheet(payload) {
      return new Promise((resolve) => {
        const callbackName = "jsonp_" + Math.round(Math.random() * 1000000);
        window[callbackName] = function(data) {
          delete window[callbackName];
          try { document.body.removeChild(script); } catch(e){}
          resolve(data);
        };
        const encodedPayload = encodeURIComponent(JSON.stringify(payload));
        const script = document.createElement("script");
        script.src = `${WEB_APP_URL}?callback=${callbackName}&prefix=${callbackName}&data=${encodedPayload}`;
        script.onerror = function() {
          if(window[callbackName]) delete window[callbackName];
          try { document.body.removeChild(script); } catch(e){}
          resolve(null);
        };
        document.body.appendChild(script);
      });
    }

    async function syncFetch() {
      try {
        const response = await sendToSpreadsheet({ action: "READ", operator: selectedUserCode });
        if (response && response.status === "success") {
          dataCache.shared = response.shared || [];
          dataCache.private = response.private || [];
          calculateRunningMetrics();
          renderFeed();
        }
      } catch (err) { console.log("Sync issue caught."); }
    }

    function calculateRunningMetrics() {
      let totalShared = 0, bubuPaid = 0, yierPaid = 0;
      
      dataCache.shared.forEach(row => {
        const amt = parseFloat(row[3]) || 0;
        totalShared += amt;
        if(row[4] === "CYO") bubuPaid += amt;
        if(row[4] === "LKS") yierPaid += amt;
      });

      let privateExp = 0;
      dataCache.private.forEach(row => {
        if(row[5] === "Expense") privateExp += (parseFloat(row[3]) || 0);
      });

      document.getElementById('val-total-expenses').textContent = `RM ${totalShared.toFixed(2)}`;
      document.getElementById('val-my-expenses').textContent = `RM ${(selectedUserCode === "CYO" ? bubuPaid : yierPaid + privateExp).toFixed(2)}`;

      document.getElementById('bal-bubu-paid').textContent = `RM ${bubuPaid.toFixed(2)}`;
      document.getElementById('bal-yier-paid').textContent = `RM ${yierPaid.toFixed(2)}`;
      
      const fairShare = totalShared / 2;
      const sentence = document.getElementById('settlement-sentence');
      if (bubuPaid > fairShare) {
        sentence.textContent = `Yier 🐼 owes Bubu 🐻 RM ${(bubuPaid - fairShare).toFixed(2)}`;
      } else if (yierPaid > fairShare) {
        sentence.textContent = `Bubu 🐻 owes Yier 🐼 RM ${(yierPaid - fairShare).toFixed(2)}`;
      } else {
        sentence.textContent = `Settled up perfectly!`;
      }
    }

    function renderFeed() {
      const feed = document.getElementById('sub-view-expenses');
      if (currentSubView !== 'expenses') return;
      feed.innerHTML = "";
      
      const rows = dataCache.shared; 
      if (!rows || rows.length === 0) {
        feed.innerHTML = `<p style="text-align:center;color:var(--text-muted);font-size:0.9rem;padding:40px 16px;">No recent expenses tracked.</p>`;
        return;
      }

      const grouped = {};
      rows.forEach(row => {
        const dateStr = row[1];
        if(!grouped[dateStr]) grouped[dateStr] = [];
        grouped[dateStr].push(row);
      });

      Object.keys(grouped).sort().reverse().forEach(dateKey => {
        const title = document.createElement('div');
        title.className = 'date-group-title';
        
        const targetDate = new Date(dateKey).setHours(0,0,0,0);
        const today = new Date().setHours(0,0,0,0);
        const yesterday = new Date(today).setDate(new Date().getDate() - 1);
        
        if(targetDate === today) title.textContent = "Today";
        else if(targetDate === yesterday) title.textContent = "Yesterday";
        else title.textContent = new Date(dateKey).toLocaleDateString('en-SG', {day:'numeric', month:'short', year:'numeric'});
        
        feed.appendChild(title);

        grouped[dateKey].reverse().forEach(row => {
          const card = document.createElement('div');
          card.className = 'tx-card-row';
          
          // Apply continuous syncing styling indicators if entry is local optimistic draft
          if(String(row[0]).startsWith("temp_")) { card.style.opacity = "0.5"; }

          const emoji = EMOJI_MAP[row[6]] || "💵";
          const payer = row[4] === "CYO" ? "布布" : "一二";
          
          card.innerHTML = `
            <div class="tx-card-left">
              <div class="tx-icon-wrapper">${emoji}</div>
              <div class="tx-meta">
                <h4>${row[2]} ${String(row[0]).startsWith("temp_") ? "<span style='font-size:0.75rem;color:var(--accent-blue);font-weight:400;'>🕒</span>" : ""}</h4>
                <p>Paid by ${payer}</p>
              </div>
            </div>
            <div class="tx-card-right">
              <span class="tx-card-value">RM ${parseFloat(row[3]).toFixed(2)}</span>
              <button class="card-trash-btn" onclick="deleteRecord('${row[0]}')">🗑️</button>
            </div>
          `;
          feed.appendChild(card);
        });
      });
    }

    async function deleteRecord(rowId) {
      if (String(rowId).startsWith("temp_")) return;
      if (!confirm("Delete this entry permanently?")) return;
      
      // Optimistic delete display engine loop
      dataCache.shared = dataCache.shared.filter(r => r[0] !== rowId);
      calculateRunningMetrics();
      renderFeed();

      await sendToSpreadsheet({ action: "DELETE", targetTable: "Shared_Ledger", rowId: rowId });
      showToast("Deleted.", "success");
      syncFetch();
    }

    function showToast(text, type) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.className = "show";
      setTimeout(() => toast.className = "", 2000);
    }
  </script>
</body>
