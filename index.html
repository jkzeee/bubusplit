<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finance Tracker PWA</title>
    <!-- Tailwind CSS for sleek styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM Development Builds -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel to compile JSX inside the script tag -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Smooth native-like slider container hardware acceleration */
        .slider-wrapper {
            display: flex;
            width: 200vw;
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }
        .page-view {
            width: 100vw;
            height: calc(100vh - 7rem); /* Responsive calculation accounting for safe-areas, header, footer */
            flex-shrink: 0;
        }
        /* Hide scrollbars for absolute clean look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased select-none overflow-hidden w-screen h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- MOCK BACKEND SERVICE ---
        const apiMock = {
            save: (tx) => new Promise((resolve, reject) => {
                setTimeout(() => Math.random() > 0.15 ? resolve({ ...tx, status: 'success' }) : reject('Network Timeout'), 1000);
            }),
            delete: (id) => new Promise((resolve, reject) => {
                setTimeout(() => Math.random() > 0.15 ? resolve() : reject('Failed to delete row'), 900);
            })
        };

        function App() {
            // UI State
            const [activeTab, setActiveTab] = useState(0); // 0 = Expenses, 1 = Balances
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [activeProfile, setActiveProfile] = useState('User A');
            const [isProfileMenuOpen, setIsProfileMenuOpen] = useState(false);

            // Data State
            const [transactions, setTransactions] = useState([
                { id: '1', description: 'Dinner at Austin Crest', amount: 120.00, category: 'Food', date: '2026-07-18', paidBy: 'User A', status: 'success' },
                { id: '2', description: 'Mid Valley Grocery', amount: 85.50, category: 'Groceries', date: '2026-07-17', paidBy: 'User B', status: 'success' }
            ]);

            // Form Fields
            const [description, setDescription] = useState('');
            const [amount, setAmount] = useState('');
            const [category, setCategory] = useState('Food');

            // Dynamic Config Placeholder
            const categories = ['Food', 'Groceries', 'Utilities', 'Transport', 'Entertainment'];

            // Initialize icons after render
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [activeTab, isModalOpen, transactions, isProfileMenuOpen]);

            // --- CRU(D) OPTIMISTIC CREATE ACTION ---
            const handleAddTransaction = async (e) => {
                e.preventDefault();
                if (!description || !amount) return;

                const tempId = `temp-${Date.now()}`;
                const newTx = {
                    id: tempId,
                    description,
                    amount: parseFloat(amount),
                    category,
                    date: new Date().toISOString().split('T')[0],
                    paidBy: activeProfile,
                    status: 'syncing'
                };

                // Optimistic Local Update & Instant Close
                setTransactions(prev => [newTx, ...prev]);
                setIsModalOpen(false);
                setDescription('');
                setAmount('');

                try {
                    await apiMock.save(newTx);
                    setTransactions(prev => prev.map(item => item.id === tempId ? { ...item, status: 'success' } : item));
                } catch (err) {
                    alert(`Error syncing transaction: "${newTx.description}". Rollback executed.`);
                    setTransactions(prev => prev.filter(item => item.id !== tempId));
                }
            };

            // --- CRU(D) OPTIMISTIC DELETE ACTION ---
            const handleDeleteTransaction = async (id, e) => {
                e.stopPropagation();
                const targetTx = transactions.find(t => t.id === id);
                if (!targetTx) return;

                // Optimistic Local Delete
                setTransactions(prev => prev.filter(item => item.id !== id));

                try {
                    await apiMock.delete(id);
                } catch (err) {
                    alert(`Error removing transaction. Restoring row.`);
                    setTransactions(prev => [targetTx, ...prev].sort((a, b) => b.id.localeCompare(a.id)));
                }
            };

            return (
                <div className="relative w-screen h-screen flex flex-col justify-between overflow-hidden pb-safe">
                    
                    {/* TOP HEADER & FRICTIONLESS PROFILE SWITCHER */}
                    <header className="h-14 bg-white border-b border-slate-200 px-4 flex justify-between items-center z-40 shrink-0">
                        <span className="font-extrabold text-lg tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">TricountTrack</span>
                        
                        <div className="relative">
                            <button 
                                onClick={() => setIsProfileMenuOpen(!isProfileMenuOpen)}
                                className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-100 hover:bg-slate-200 active:scale-95 transition-all"
                            >
                                <span className="w-5 h-5 rounded-full bg-blue-600 text-white text-[11px] font-bold flex items-center justify-center">
                                    {activeProfile.charAt(5)}
                                </span>
                                <span className="text-xs font-semibold text-slate-700">{activeProfile}</span>
                                <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-slate-500"></i>
                            </button>

                            {isProfileMenuOpen && (
                                <div className="absolute right-0 mt-2 w-40 bg-white border border-slate-200 rounded-xl shadow-lg py-1 z-50">
                                    {['User A', 'User B'].map(profile => (
                                        <button
                                            key={profile}
                                            onClick={() => { setActiveProfile(profile); setIsProfileMenuOpen(false); }}
                                            className={`w-full text-left px-4 py-2 text-xs font-medium ${activeProfile === profile ? 'bg-blue-50 text-blue-600' : 'text-slate-700 hover:bg-slate-50'}`}
                                        >
                                            {profile}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                    </header>

                    {/* INTERACTIVE SMOOTH LEFT-RIGHT PAGE SLIDER CONTAINER */}
                    <main className="flex-1 overflow-hidden relative">
                        <div 
                            className="slider-wrapper h-full"
                            style={{ transform: `translateX(-${activeTab * 100}vw)` }}
                        >
                            {/* TAB 1 PAGE VIEW: EXPENSES LOADER */}
                            <div className="page-view no-scrollbar overflow-y-auto p-4 space-y-3">
                                <div className="flex justify-between items-center mb-1">
                                    <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Transaction History</h2>
                                    <span className="text-xs font-medium text-slate-500 bg-slate-200 px-2 py-0.5 rounded-md">Optimistic State</span>
                                </div>

                                {transactions.length === 0 ? (
                                    <div className="text-center py-12 text-slate-400 text-sm">No expenses logged yet. Tap + to start.</div>
                                ) : (
                                    transactions.map(tx => (
                                        <div 
                                            key={tx.id}
                                            className={`p-4 bg-white border border-slate-100 rounded-2xl shadow-sm flex justify-between items-center transition-all ${tx.status === 'syncing' ? 'opacity-50 border-orange-200 bg-orange-50/20' : ''}`}
                                        >
                                            <div className="flex flex-col gap-1">
                                                <span className="font-semibold text-sm text-slate-800">{tx.description}</span>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tight bg-slate-100 px-1.5 py-0.5 rounded">{tx.category}</span>
                                                    <span className="text-[10px] text-slate-400">Paid by {tx.paidBy}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <div className="text-right flex flex-col items-end">
                                                    <span className="font-bold text-base text-slate-900">RM {tx.amount.toFixed(2)}</span>
                                                    {tx.status === 'syncing' ? (
                                                        <span className="text-[10px] text-orange-500 font-medium animate-pulse flex items-center gap-1">
                                                            <span className="w-1.5 h-1.5 bg-orange-500 rounded-full animate-ping"></span> Syncing
                                                        </span>
                                                    ) : (
                                                        <span className="text-[10px] text-emerald-500 font-medium">Synced</span>
                                                    )}
                                                </div>
                                                <button 
                                                    onClick={(e) => handleDeleteTransaction(tx.id, e)}
                                                    className="w-8 h-8 rounded-full bg-slate-50 hover:bg-red-50 text-slate-400 hover:text-red-500 flex items-center justify-center transition-colors"
                                                >
                                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {/* TAB 2 PAGE VIEW: BALANCES / VAULTS */}
                            <div className="page-view no-scrollbar overflow-y-auto p-4">
                                <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Shared Balance Overview</h2>
                                <div className="bg-white border border-slate-100 p-6 rounded-2xl shadow-sm text-center space-y-4">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto">
                                        <i data-lucide="scale" class="w-8 h-8"></i>
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-base text-slate-800">Everything is balanced</h3>
                                        <p className="text-xs text-slate-500 mt-1">Shared vaults are configured to run automatically.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* TRICOUNT-INSPIRED FLOATING ENTRY ACTION BUTTON */}
                    <div className="absolute bottom-20 left-1/2 -translate-x-1/2 z-40">
                        <button 
                            onClick={() => setIsModalOpen(true)}
                            className="w-14 h-14 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-full shadow-xl shadow-blue-500/20 flex items-center justify-center font-bold text-2xl hover:scale-105 active:scale-95 transition-all"
                        >
                            <i data-lucide="plus" class="w-6 h-6"></i>
                        </button>
                    </div>

                    {/* FULL SCREEN OPTIMIZED NAV FOOTER BAR */}
                    <footer className="h-16 bg-white border-t border-slate-200 px-8 flex justify-between items-center z-30 shrink-0">
                        <button 
                            onClick={() => setActiveTab(0)}
                            className={`flex flex-col items-center gap-1 w-20 transition-colors ${activeTab === 0 ? 'text-blue-600 font-semibold' : 'text-slate-400'}`}
                        >
                            <i data-lucide="receipt" class="w-5 h-5"></i>
                            <span className="text-[10px]">Expenses</span>
                        </button>
                        <div className="w-16"></div> {/* Spacer for FAB positioning */}
                        <button 
                            onClick={() => setActiveTab(1)}
                            className={`flex flex-col items-center gap-1 w-20 transition-colors ${activeTab === 1 ? 'text-blue-600 font-semibold' : 'text-slate-400'}`}
                        >
                            <i data-lucide="wallet" class="w-5 h-5"></i>
                            <span className="text-[10px]">Balances</span>
                        </button>
                    </footer>

                    {/* INSTANT SLIDE-UP OPTIMISTIC ENTRY FORM MODAL */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
                            <div className="fixed inset-0" onClick={() => setIsModalOpen(false)}></div>
                            <form 
                                onSubmit={handleAddTransaction} 
                                className="bg-white w-full max-w-md p-6 rounded-t-3xl sm:rounded-2xl space-y-4 shadow-2xl relative z-10 animate-in slide-in-from-bottom duration-200"
                            >
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto sm:hidden mb-2"></div>
                                <h3 className="text-base font-bold text-slate-800">Add New Transaction</h3>
                                
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 uppercase">Description</label>
                                    <input 
                                        type="text" placeholder="e.g. Lunch" required 
                                        value={description} onChange={(e) => setDescription(e.target.value)}
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500"
                                    />
                                </div>

                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 uppercase">Amount (RM)</label>
                                    <input 
                                        type="number" step="0.01" placeholder="0.00" required 
                                        value={amount} onChange={(e) => setAmount(e.target.value)}
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500"
                                    />
                                </div>

                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 uppercase">Category</label>
                                    <select 
                                        value={category} onChange={(e) => setCategory(e.target.value)}
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 appearance-none"
                                    >
                                        {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>

                                <div className="flex justify-between gap-3 pt-2">
                                    <button 
                                        type="button" onClick={() => setIsModalOpen(false)} 
                                        className="w-1/2 p-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold text-sm rounded-xl transition-colors"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        type="submit" 
                                        className="w-1/2 p-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm rounded-xl transition-colors"
                                    >
                                        Save Instantly
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
